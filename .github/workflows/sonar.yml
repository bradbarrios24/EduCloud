# =============================================================================
# .github/workflows/sonar.yml
# Análisis de calidad con SonarQube en cada push y pull request
# Secretos requeridos en el repo (Settings → Secrets → Actions):
#   SONAR_TOKEN    → token generado en SonarQube (My Account → Security)
#   SONAR_HOST_URL → URL pública de tu SonarQube (ej: https://sonar.midominio.com)
# =============================================================================

name: Análisis SonarQube

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  sonar:
    name: SonarQube Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Instalar dependencias del frontend
        working-directory: frontend
        run: npm ci

      - name: Ejecutar análisis SonarQube
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

      - name: Verificar Quality Gate
        uses: SonarSource/sonarqube-quality-gate-action@v1
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          
      - name: Ejecutar análisis SonarQube
        uses: SonarSource/sonarqube-scan-action@v3
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
          SONAR_SCANNER_OPTS: "-Dsonar.scanner.proxyHost= -Dhttp.useragent=SonarScanner"